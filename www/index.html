<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="terminal.js"></script>
    <script src="code.js"></script>
    <title>Damian Moser - Terminal</title>
    <link rel="stylesheet" href="reset.css" type="text/css" />
    <link rel="stylesheet" href="monospace.css" type="text/css" />
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="overlay"></div>

    <div id="terminal">
      <div id="intro">
        <span id="typed-intro"></span>
      </div>
      <div id="output"></div>
      <div id="input-line" style="display: none">
        <span id="prompt" class="prompt">damo@portfolio:~$ </span>
        <input
          type="text"
          id="command-input"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="completion-container"></div>
    </div>

    <!-- Hidden image elements for the visual effects -->
    <figure style="display: none">
      <img src="img/linux.jpg" alt="Terminal background" />
      <div class="shard" data-width="50" data-height="25">
        <img src="img/linux.jpg" alt="Terminal background" />
        <img src="img/linux_cipher.jpg" alt="Cipher artifact" />
      </div>
    </figure>
  </body>
</html>
