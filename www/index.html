<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/input-handling.js"></script>
    <script src="js/command-execution.js"></script>
    <script src="js/tab-completion.js"></script>
    <script src="js/intro-animation.js"></script>
    <script src="js/clickable-commands.js"></script>
    <script src="js/terminal-utils.js"></script>
    <script src="js/shardify.js"></script>
    <script src="js/inactivity-timer.js"></script>
    <title>Damian Moser - Terminal</title>
    <link rel="stylesheet" href="reset.css" type="text/css" />
    <link rel="stylesheet" href="monospace.css" type="text/css" />
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="overlay"></div>

    <div id="terminal">
      <div id="intro">
        <span id="typed-intro"></span>
      </div>
      <div id="output"></div>
      <div id="input-line" style="display: none">
        <span id="prompt" class="prompt">damo@portfolio:~$ </span>
        <input
          type="text"
          id="command-input"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="completion-container"></div>
    </div>

    <!-- Hidden image elements for the visual effects -->
  </body>
</html>
